<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<script async src="/analytics.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/mark-color.png">
<title>The A&R Room · Got an ear for music?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/tokens.css?v=3">
<link rel="stylesheet" href="/ui.css?v=1">
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:0 16px 60px;background:radial-gradient(130% 70% at 50% -6%, #241a4d 0%, var(--bg) 52%);color:var(--ink);font-family:"DM Sans",system-ui,sans-serif;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:560px;margin:0 auto}
  .mono{font-family:"Space Mono",ui-monospace,Menlo,monospace}
  /* nav */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:18px 2px 16px;position:sticky;top:0;background:linear-gradient(180deg,rgba(13,11,22,.96),rgba(13,11,22,.6));backdrop-filter:blur(7px);z-index:10}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--signal);box-shadow:0 0 10px 1px rgba(75,183,73,.6)}
  .brand .nm{font-weight:800;font-size:16px;letter-spacing:-.01em}
  .nav-links{display:flex;gap:16px;font-size:12px;color:var(--ink-dim)}
  .nav-links a{cursor:pointer}.nav-links a:hover{color:var(--ink)}
  /* live banner */
  .live-banner{display:flex;align-items:center;gap:11px;background:rgba(255,93,108,.12);border:1px solid #5a2230;border-radius:13px;padding:13px 15px;margin-bottom:16px}
  .live-banner .pulse{width:11px;height:11px;border-radius:50%;background:var(--hot);box-shadow:0 0 0 0 rgba(255,93,108,.7);animation:pulse 1.8s infinite;flex:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,93,108,.6)}70%{box-shadow:0 0 0 11px rgba(255,93,108,0)}100%{box-shadow:0 0 0 0 rgba(255,93,108,0)}}
  .live-banner .lb-txt{flex:1;min-width:0}
  .live-banner .lb-t{font-weight:800;font-size:15px;color:#ff8b96}
  .live-banner .lb-s{font-size:12px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .live-banner .btn{font-weight:800;padding:10px 16px}
  /* hero */
  .hero{text-align:center;padding:18px 6px 20px}
  .hero h1{font-size:33px;font-weight:800;line-height:1.08;letter-spacing:-.02em;margin:0 0 12px}
  .hero h1 .grad{color:var(--signal)}
  .hero p{font-size:15px;color:var(--ink-dim);line-height:1.5;margin:0 auto 18px;max-width:360px}
  .hero .btn{padding:14px 28px}
  .hero .btn.ghost{margin-top:10px}
  .nav-join{font-size:12px;font-weight:700;color:#06210b;background:var(--signal);padding:6px 12px;border-radius:8px}
  .prize{display:inline-flex;align-items:center;gap:6px;background:rgba(245,165,36,.12);border:1px solid #5a4a1d;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--amber);margin-bottom:16px}
  /* stream */
  /* live block = a branded graphic (no live frame / no YouTube thumbnail) */
  .stream{position:relative;aspect-ratio:16/9;background:radial-gradient(120% 100% at 50% 0%, #2a1f55 0%, #15101f 70%);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;gap:9px;padding:16px;text-align:center;overflow:hidden}
  .stream .lvtag{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;background:rgba(255,93,108,.92);color:#2a0a0e;font-size:10px;font-weight:800;padding:4px 9px;border-radius:6px;letter-spacing:.06em}
  .stream .st-mark{width:40px;height:40px;object-fit:contain;opacity:.95}
  .stream .st-brand{font-weight:800;font-size:16px;letter-spacing:-.01em}
  .stream .st-now{font-size:12.5px;color:var(--ink-dim);max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stream .st-watch{margin-top:4px;background:var(--hot);color:#2a0a0e;font-size:12px;font-weight:800;padding:9px 16px;border-radius:9px}
  .watch-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
  .watch-chip{font-size:12px;color:var(--ink-dim);border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer}
  .watch-chip.yt{border-color:var(--hot);color:#ff8b96}
  /* sections */
  .sec{margin-bottom:20px}
  .sec-h{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin:0 0 11px 2px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:15px;padding:15px}
  .howrow{display:flex;gap:9px;margin-bottom:20px}
  .how{flex:1;background:#0f0c1c;border:1px solid var(--line);border-radius:12px;padding:13px 9px;text-align:center}
  .how .hn{font-family:"Space Mono",monospace;font-size:12px;color:var(--signal);font-weight:700}
  .how .ht{font-size:12px;color:var(--ink-dim);margin-top:6px;line-height:1.35}
  /* upcoming */
  .upcoming{display:flex;align-items:center;gap:13px}
  .up-date{font-family:"Space Mono",monospace;text-align:center;background:#0f0c1c;border:1px solid var(--line);border-radius:11px;padding:9px 12px;flex:none}
  .up-date .d{font-size:20px;font-weight:700;line-height:1}
  .up-date .m{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
  .up-meta{flex:1;min-width:0}
  .up-name{font-size:15px;font-weight:700}
  .up-time{font-size:12px;color:var(--ink-dim);margin-top:2px}
  .up-remind{font-size:13px;font-weight:700;color:#06210b;background:var(--signal);border-radius:9px;padding:9px 15px;cursor:pointer;white-space:nowrap}
  .sub-link{display:inline-block;margin-top:9px;font-size:12px;color:var(--cool);font-weight:600}
  /* leaderboard */
  .lbrow{display:flex;align-items:center;gap:10px;padding:8px 0;color:inherit;text-decoration:none}
  a.lbrow{cursor:pointer}a.lbrow:hover .lbnm{color:var(--cool)}
  .lbrow+.lbrow{border-top:1px solid var(--line)}
  .lbrank{font-family:"Space Mono",monospace;font-size:14px;font-weight:700;width:20px;color:var(--ink-dim)}
  .lbrank.t{color:var(--signal)}
  .lbav{width:32px;height:32px;border-radius:50%;flex:none;background:#221b3a;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:12px;border:1px solid var(--line);object-fit:cover}
  .lbnm{flex:1;font-size:14px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbnm small{display:block;font-size:10px;color:var(--ink-faint);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lbnm .tag{display:inline-block;font-size:9px;color:var(--cool);background:rgba(124,111,240,.14);border-radius:5px;padding:1px 5px;font-weight:600;margin-right:5px;vertical-align:1px}
  /* recent-A&Rs activity ticker */
  .ticker{overflow:hidden;border:1px solid var(--line);border-radius:13px;background:#0f0c1c;padding:11px 0;position:relative}
  .ticker:hover .ticker-track{animation-play-state:paused}
  /* inline-flex = reliable intrinsic width on iOS WebKit (max-content was flaky);
     translate3d + will-change forces GPU compositing so the marquee runs on mobile. */
  .ticker-track{display:inline-flex;gap:10px;padding:0 5px;white-space:nowrap;will-change:transform;animation:tk 38s linear infinite}
  @keyframes tk{from{transform:translate3d(0,0,0)}to{transform:translate3d(-50%,0,0)}}
  /* Intentionally NOT gated on prefers-reduced-motion: many iPhones have Reduce Motion
     on (or it rides along with Low Power Mode), which killed this ticker. A slow 38s
     linear crawl is mild enough to keep running by design. */
  .tk-item{display:flex;align-items:center;gap:9px;padding:6px 14px 6px 6px;border:1px solid var(--line);border-radius:999px;background:var(--panel);flex:none;color:inherit;text-decoration:none}
  a.tk-item{cursor:pointer}a.tk-item:hover{border-color:var(--accent)}
  .tk-av{width:34px;height:34px;border-radius:50%;flex:none;object-fit:cover;border:1px solid var(--line);background:#221b3a;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:12px}
  .tk-nm{font-size:13px;font-weight:600;line-height:1.15;white-space:nowrap}
  .tk-sub{font-size:10px;color:var(--ink-faint);white-space:nowrap}
  .lbpts{font-family:"Space Mono",monospace;font-size:14px;font-weight:700}
  .empty{text-align:center;padding:22px 14px;color:var(--ink-faint);font-size:13px;line-height:1.5}
  .empty .ico{font-size:24px;margin-bottom:8px;opacity:.55}
  /* submit */
  .submit{background:linear-gradient(180deg,rgba(64,54,148,.25),rgba(64,54,148,.1));border:1px solid var(--brand-purple);border-radius:15px;padding:17px;text-align:center;margin-bottom:18px}
  .submit .s-t{font-size:15px;font-weight:700;margin-bottom:5px}
  .submit .s-s{font-size:12.5px;color:var(--ink-dim);margin-bottom:13px;line-height:1.45}
  .submit .s-actions{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
  .submit .btn{padding:10px 20px}
  .foot{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:8px}
  .hide{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <div class="brand"><span class="dot"></span><span class="nm">The A&amp;R Room</span></div>
    <div class="nav-links">
      <a id="navBoard" onclick="document.getElementById('secBoard')?.scrollIntoView({behavior:'smooth'})">Leaderboard</a>
      <a id="navWinners" onclick="document.getElementById('secWinners')?.scrollIntoView({behavior:'smooth'})">Winners</a>
      <a class="nav-join" id="navJoin" href="/join">Join</a>
    </div>
  </div>

  <div id="content">
    <div class="empty" style="padding:80px 0"><div class="ico">🎧</div>Loading…</div>
  </div>

  <p class="foot">Makin' It Magazine · The A&amp;R Room</p>
</div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// GA4 engagement events (no-op when analytics is disabled or gtag hasn't loaded).
function track(name, params){ try{ if(window.gtag) window.gtag('event', name, params||{}); }catch(e){} }
const initials=n=>String(n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
const SUBMIT_URL='https://www.makinitmag.com/review'; // artist-submission page

function fmtPts(n){return (Number(n)||0).toLocaleString();}
// Session times are anchored to the broadcast timezone (ET) so every visitor sees the
// same clock time, correctly labelled — not their own local time mislabelled "ET".
const ET_TZ='America/New_York';
function fmtET(ms,opts){return new Date(Number(ms)).toLocaleString('en-US',{timeZone:ET_TZ,...opts});}
function dateBlock(ms){
  if(!ms)return {d:'—',m:'TBA'};
  return {d:fmtET(ms,{day:'numeric'}), m:fmtET(ms,{month:'short'})};
}
function whenLine(ms){
  if(!ms)return 'Date to be announced · 6 platforms';
  return fmtET(ms,{weekday:'short'})+' · '+fmtET(ms,{hour:'numeric',minute:'2-digit'})+' ET · 6 platforms';
}

function lbCard(rows){
  if(!rows||!rows.length)return `<div class="card"><div class="empty"><div class="ico">📊</div>No standings yet — they fill in as A&Rs rate songs in tagged sessions.</div></div>`;
  return '<div class="card">'+rows.map(r=>{
    const sub=[r.category?`<span class="tag">${esc(r.category)}</span>`:'', r.location?esc(r.location):''].filter(Boolean).join('');
    const av=r.photoUrl?`<img class="lbav" src="${esc(r.photoUrl)}" alt="">`:`<div class="lbav">${esc(initials(r.name))}</div>`;
    const inner=`<span class="lbrank${r.rank<=3?' t':''}">${r.rank}</span>${av}<div class="lbnm">${esc(r.name)}${sub?`<small>${sub}</small>`:''}</div><span class="lbpts">${fmtPts(r.points)}</span>`;
    return r.id?`<a class="lbrow" href="/u/${encodeURIComponent(r.id)}">${inner}</a>`:`<div class="lbrow">${inner}</div>`;
  }).join('')+'</div>';
}
function howRow(){
  return `<div class="howrow" id="secHow">
    <div class="how"><div class="hn">01</div><div class="ht">Rate the song</div></div>
    <div class="how"><div class="hn">02</div><div class="ht">Predict the room</div></div>
    <div class="how"><div class="hn">03</div><div class="ht">Climb &amp; qualify</div></div>
  </div>`;
}
function nextCard(next){
  if(!next)return `<div class="sec"><p class="sec-h">Next session</p><div class="card"><div class="empty">No session scheduled yet — check back soon.</div></div></div>`;
  const db=dateBlock(next.scheduledAt);
  const submit=next.submitUrl?`<a class="sub-link" href="${esc(next.submitUrl)}" target="_blank" rel="noopener" onclick="track('music_submit_click',{action:'link'})">🎤 Know an artist? Submit music for this session ↗</a>`:'';
  return `<div class="sec" id="secNext"><p class="sec-h">Next session</p>
    <div class="card upcoming">
      <div class="up-date"><div class="d">${esc(db.d)}</div><div class="m">${esc(db.m)}</div></div>
      <div class="up-meta"><div class="up-name">${esc(next.name)}</div><div class="up-time">${esc(whenLine(next.scheduledAt))}</div></div>
      <a class="up-remind" href="/?s=${encodeURIComponent(next.id)}">Register</a>
    </div>${submit}</div>`;
}
function boardSection(series,label){
  // Hidden entirely until there are standings — no empty placeholder on the front door.
  if(!series || !series.leaderboard || !series.leaderboard.length) return '';
  const title=label||('Series leaderboard · '+esc(series.title));
  return `<div class="sec" id="secBoard"><p class="sec-h">${title}</p>${lbCard(series.leaderboard)}</div>`;
}
function winnersSection(winners){
  // Hidden until a champion exists — no "winners appear here" placeholder.
  if(!winners || !winners.length) return '';
  const body='<div class="card">'+winners.map(w=>`<div class="lbrow"><span class="lbrank t">🏆</span><div class="lbnm">${esc(w.name)}<small>${esc(w.series||'')}</small></div><span class="lbpts">${fmtPts(w.points)}</span></div>`).join('')+'</div>';
  return `<div class="sec" id="secWinners"><p class="sec-h">Past winners</p>${body}</div>`;
}
function tickerSection(ars){
  if(!ars || !ars.length) return '';
  const item=a=>{
    const av=a.photoUrl?`<img class="tk-av" src="${esc(a.photoUrl)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'tk-av',textContent:'${esc(initials(a.name))}'}))">`:`<span class="tk-av">${esc(initials(a.name))}</span>`;
    const sub=[a.category,a.location].filter(Boolean).join(' · ');
    const inner=`${av}<div><div class="tk-nm">${esc(a.name)}</div>${sub?`<div class="tk-sub">${esc(sub)}</div>`:''}</div>`;
    return a.id?`<a class="tk-item" href="/u/${encodeURIComponent(a.id)}">${inner}</a>`:`<div class="tk-item">${inner}</div>`;
  };
  const items=ars.map(item).join('');
  // Items duplicated so the marquee loops seamlessly (track scrolls exactly -50%).
  return `<div class="sec"><p class="sec-h">New A&Rs</p><div class="ticker"><div class="ticker-track">${items}${items}</div></div></div>`;
}
function submitSection(sUrl){
  // Audience-facing: viewers refer artists they know (a retention/word-of-mouth lever).
  // Uses the featured session's own submission link when it has one, else the house default.
  const href=sUrl||SUBMIT_URL;
  return `<div class="submit" id="secSubmit">
    <div class="s-t">Know an artist we need to hear?</div>
    <div class="s-s">Send them here to submit — the room reviews new music live, so a real audience gives it real ears.</div>
    <div class="s-actions">
      <a class="btn accent sm" href="${esc(href)}" target="_blank" rel="noopener">Have them submit</a>
      <button class="btn accent sm" onclick="shareSubmit(this,'${esc(href)}')">Share link</button>
    </div>
  </div>`;
}
async function shareSubmit(btn,url){
  track('music_submit_click',{action:'share'});
  if(navigator.share){ try{ await navigator.share({title:'Submit your music — The A&R Room', url}); return; }catch(e){ if(e&&e.name==='AbortError')return; } }
  try{ await navigator.clipboard.writeText(url); const t=btn.textContent; btn.textContent='Link copied ✓'; setTimeout(()=>btn.textContent=t,1600); }
  catch(e){ prompt('Copy this submit link:', url); }
}

function renderLive(d){
  const live=d.live;
  const voteHref='/?s='+encodeURIComponent(live.id);
  // Branded "Live now" graphic — not a live frame or the YouTube thumbnail (which is the
  // promo card). Real-frame capture is a deliberate later decision.
  const watchBtn=live.watchUrl?`<a class="st-watch" href="${esc(live.watchUrl)}" target="_blank" rel="noopener">Watch on YouTube ↗</a>`:'';
  $('#content').innerHTML=`
    <div class="live-banner">
      <span class="pulse"></span>
      <div class="lb-txt"><div class="lb-t">Live right now!</div><div class="lb-s">${esc(live.nowPlaying||live.name)} · ${live.arCount} A&Rs in the room</div></div>
      <a class="btn hot sm" href="${voteHref}">Get in to vote</a>
    </div>
    <div class="stream">
      <span class="lvtag">● LIVE</span>
      <img class="st-mark" src="/mark-color.png" alt="" onerror="this.style.display='none'">
      <div class="st-brand">The A&amp;R Room</div>
      <div class="st-now">${esc(live.nowPlaying||live.name)}</div>
      ${watchBtn}
    </div>
    <div class="hero" style="padding:6px 6px 18px">
      <p style="margin-bottom:14px;max-width:380px">Watching on another screen? Jump in here and vote — rate the current song and read the room.</p>
      <a class="btn hot lg" href="${voteHref}">Get in to vote</a>
    </div>
    ${tickerSection(d.recentARs)}
    ${boardSection(d.series,'Live standings · updating')}
    ${winnersSection(d.winners)}
    ${submitSection(d.live&&d.live.submitUrl)}`;
}
function renderBetween(d){
  // With an upcoming session, "Register to play" leads and Join is secondary. With no
  // session, "Join the A&R Team" becomes the primary action (the registration that was missing).
  const heroCta=d.next
    ? `<a class="btn lg" href="/?s=${encodeURIComponent(d.next.id)}" onclick="track('register_click',{from:'home'})">Register to play</a><a class="btn ghost lg" href="/join">Join the A&R Team</a>`
    : `<a class="btn lg" href="/join">Join the A&R Team</a><a class="btn ghost lg" onclick="document.getElementById('secHow')?.scrollIntoView({behavior:'smooth'})">See how it works</a>`;
  $('#content').innerHTML=`
    <div class="hero">
      <div class="prize">💰 $500 monthly cash prize</div>
      <h1>Got an ear<br><span class="grad">for music?</span></h1>
      <p>Rate songs, read the room, climb the leaderboard. Top A&Rs compete in A&amp;R Wars for the cash.</p>
      ${heroCta}
    </div>
    ${howRow()}
    ${tickerSection(d.recentARs)}
    ${nextCard(d.next)}
    ${boardSection(d.series)}
    ${winnersSection(d.winners)}
    ${submitSection(d.next&&d.next.submitUrl)}`;
}

let _homeSig=null;
async function load(){
  try{
    const r=await fetch('/api/home');
    const d=await r.json();
    // Skip the re-render when nothing changed — rebuilding #content restarts the
    // "New A&Rs" ticker's CSS animation, which looked like it wasn't scrolling.
    const sig=JSON.stringify(d);
    if(sig===_homeSig){ _ensureRealtime(d.live && d.live.id); return; }
    _homeSig=sig;
    if(d.live)renderLive(d); else renderBetween(d);
    _homeSeriesId=(d.series && d.series.id)||null;
    _ensureRealtime(d.live && d.live.id);
    // Nav links only show when their section rendered (sections hide when empty).
    const navToggle=(id,present)=>{const el=$('#'+id);if(el)el.style.display=present?'':'none';};
    navToggle('navBoard', !!document.getElementById('secBoard'));
    navToggle('navWinners', !!document.getElementById('secWinners'));
  }catch(e){
    $('#content').innerHTML='<div class="empty" style="padding:60px 0"><div class="ico">⚠️</div>Couldn\'t load right now. Refresh to try again.</div>';
  }
}
load();
// Light 30s refresh as the safety net; realtime makes live updates instant below.
setInterval(load, 30000);

// ---- realtime: when a session is live, refresh the homepage the instant it changes ----
// Keyed to the live session's channel (re-subscribes if a different session goes live);
// no-op when nothing is live or the key is unset. The 30s poll remains the fallback.
let _rt=null,_rtChan=null,_rtSid=undefined,_rtRefreshT=null,_homeSeriesId=null;
// Apply a pushed series board directly (no /api/home fetch) — reuses the same row template
// the initial render uses, so the board updates for every viewer from one server compute.
function applySeriesBoard(rows){
  const sec=document.getElementById('secBoard'); if(!sec)return;
  const titleP=sec.querySelector('.sec-h'); const titleHtml=titleP?titleP.outerHTML:'';
  sec.innerHTML=titleHtml+lbCard(rows||[]);
}
async function _ensureRealtime(liveId){
  liveId=liveId||null;
  if(_rtSid===liveId)return;                       // no change
  if(_rt){ try{_rt.close();}catch(e){} _rt=null;_rtChan=null; }
  _rtSid=liveId;
  if(!liveId)return;                               // nothing live -> 30s poll only
  try{
    const probe=await fetch('/api/ably/token?s='+encodeURIComponent(liveId)).then(r=>r.json());
    if(!probe||probe.enabled===false||!probe.keyName){ _rtSid=undefined; return; }
    if(!window.Ably) await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.ably.com/lib/ably.min-2.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    if(_rtSid!==liveId)return;                      // a newer load() superseded us
    _rt=new Ably.Realtime({ authUrl:'/api/ably/token?s='+encodeURIComponent(liveId) });
    _rtChan=_rt.channels.get('anr:session:'+liveId);
    _rtChan.subscribe('change',(msg)=>{
      const pushed=msg&&msg.data&&msg.data.payload&&msg.data.payload.series;
      // Leaderboard payload for the series we're showing -> apply directly, skip the fetch.
      if(pushed && pushed.id===_homeSeriesId && Array.isArray(pushed.leaderboard)){ applySeriesBoard(pushed.leaderboard); return; }
      // Anything else (go-live, round changes) -> a coalesced refresh.
      if(_rtRefreshT)return; _rtRefreshT=setTimeout(()=>{_rtRefreshT=null;load();},300);
    });
  }catch(e){ /* stay on 30s poll */ }
}

// Logged-in A&Rs see "My Profile" (-> their editable profile) instead of "Join".
(async function initNav(){
  const tok=localStorage.getItem('rt_auth_token'); if(!tok)return;
  try{
    const me=await fetch('/api/auth/me',{headers:{'X-Auth-Token':tok}}).then(r=>r.ok?r.json():null);
    if(me&&me.uid){ const j=document.getElementById('navJoin'); j.textContent='My Profile'; j.href='/profile'; }
  }catch(e){}
})();
</script>
