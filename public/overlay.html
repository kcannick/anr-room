<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The A&R Room — Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* OBS browser source: transparent background by design. The page paints nothing
     full-bleed — only the cards have backgrounds — so the stream shows through. */
  :root{
    --ink:#f3f0fb; --ink-dim:#bdb6d8; --ink-faint:#8c84ad;
    --signal:#4bb749; --cool:#7c6ff0; --hot:#ff5d6c; --gold:#f5a524;
    --panel:rgba(16,12,26,.86); --panel-2:rgba(10,8,20,.82);
    --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent}
  body{
    font-family:"DM Sans",system-ui,sans-serif;color:var(--ink);
    width:1920px;height:1080px;overflow:hidden;position:relative;
    /* scale to fit whatever the browser source is sized to */
    transform-origin:top left;
  }
  .mono{font-family:"Space Mono",monospace}
  .hide{display:none!important}

  /* shared card chrome */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:22px;
    backdrop-filter:blur(8px);box-shadow:0 24px 60px rgba(0,0,0,.45)}
  .eyebrow{font-size:18px;letter-spacing:.26em;text-transform:uppercase;color:var(--signal);font-weight:700}
  .dim{color:var(--ink-dim)} .faint{color:var(--ink-faint)}

  /* ---- LOWER THIRD: current song / matchup ---- */
  #lower{position:absolute;left:60px;right:60px;bottom:56px;padding:34px 44px;display:flex;align-items:center;gap:36px}
  #lower .brandtag{display:flex;flex-direction:column;gap:6px;flex:none;border-right:1px solid var(--line);padding-right:36px}
  #lower .brandtag .room{font-weight:800;font-size:30px;letter-spacing:-.01em}
  #lower .brandtag .sess{font-size:18px;color:var(--ink-dim);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #lower .main{flex:1;min-width:0}
  #lower .nowtag{font-size:18px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  #lower .ovtimer{font-family:"Space Mono",monospace;font-weight:700;margin-left:14px;letter-spacing:.04em;color:var(--signal)}
  #lower .ovtimer.warn{color:var(--hot)}
  #lower .title{font-size:54px;font-weight:800;line-height:1.04;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #lower .artist{font-size:26px;color:var(--ink-dim);margin-top:4px}
  #lower .vs{color:var(--cool);font-weight:800}
  #lower .right{flex:none;text-align:right;min-width:300px}
  #lower .countlabel{font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  #lower .bignum{font-family:"Space Mono",monospace;font-size:84px;font-weight:700;line-height:.95;color:var(--signal)}
  #lower .sub{font-size:18px;color:var(--ink-dim);margin-top:2px}
  /* binary matchup: A vs B, each full title + artist, NO live split (it's the prediction target) */
  #vsRow{display:flex;align-items:center;gap:26px;margin-top:4px}
  #vsRow .side{flex:1;min-width:0}
  #vsRow .st{display:flex;align-items:baseline;gap:10px}
  #vsRow .sl{font-size:22px;font-weight:800;letter-spacing:.08em;flex:none}
  #vsRow .side.a .sl{color:var(--signal)} #vsRow .side.b .sl{color:var(--cool)}
  #vsRow .stitle{font-size:40px;font-weight:800;line-height:1.04;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #vsRow .sartist{font-size:22px;color:var(--ink-dim);margin-left:32px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #vsRow .vsmid{color:var(--cool);font-weight:800;font-size:34px;flex:none}

  /* ---- LEADERBOARD: right rail ---- */
  #board{position:absolute;top:60px;right:60px;width:440px;padding:28px 30px}
  #board h3{font-size:22px;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:10px;margin-bottom:16px}
  #board h3 .dotlive{width:12px;height:12px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 0 rgba(75,183,73,.7);animation:pulse 2s infinite}
  .lbrow{display:flex;align-items:center;gap:14px;padding:11px 0;border-top:1px solid var(--line)}
  .lbrow:first-of-type{border-top:none}
  .lbrow .rk{font-family:"Space Mono",monospace;font-size:24px;font-weight:700;width:46px;color:var(--ink-faint)}
  .lbrow.top1 .rk{color:var(--gold)} .lbrow.top2 .rk{color:var(--ink)} .lbrow.top3 .rk{color:#cd7f32}
  .lbrow .nm{flex:1;font-size:26px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbrow .pts{font-family:"Space Mono",monospace;font-size:26px;font-weight:700;color:var(--signal)}

  /* ---- WINNER REVEAL: shares the lower-third slot (swaps with #lower) ---- */
  #result{position:absolute;left:60px;right:60px;bottom:56px;padding:30px 44px;display:flex;align-items:center;gap:30px;border-color:var(--gold)}
  #result .crown{font-size:60px;flex:none;border-right:1px solid var(--line);padding-right:30px}
  #result .rmeta{flex:1;min-width:0}
  #result .rlabel{font-size:18px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700}
  #result .rwin{font-size:50px;font-weight:800;line-height:1.02;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #result .rsong{font-size:22px;color:var(--ink-dim);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* rating: room average in the right slot */
  #result .rroom{flex:none;text-align:right;min-width:240px}
  #result .rroom .k{font-size:16px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  #result .rroom .v{font-family:"Space Mono",monospace;font-size:64px;font-weight:700;color:var(--signal);line-height:1}
  /* binary: full-width split bar revealed under the winner name (no right slot) */
  #resSplit{margin-top:13px}
  #resSplit .bar{display:flex;height:16px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  #resSplit .bar .a{background:var(--signal)} #resSplit .bar .b{background:var(--cool)}
  #resSplit .labels{display:flex;justify-content:space-between;font-size:22px;font-weight:700;margin-top:8px;color:var(--ink-dim)}

  /* ---- BROADCAST in lower-third slot ---- */
  #bcastLower{position:absolute;left:60px;right:60px;bottom:56px;padding:34px 44px;display:flex;align-items:center;gap:36px;border-color:var(--gold)}
  #bcastLower .brandtag{display:flex;flex-direction:column;gap:6px;flex:none;border-right:1px solid var(--line);padding-right:36px}
  #bcastLower .brandtag .room{font-weight:800;font-size:30px;letter-spacing:-.01em;color:var(--gold)}
  #bcastLower .brandtag .sess{font-size:18px;color:var(--ink-dim);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #bcastLower .main{flex:1;min-width:0}
  #bcastLower .nowtag{font-size:18px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}

  /* idle / connecting */
  #idle{position:absolute;left:60px;bottom:56px;padding:24px 34px}
  #idle .t{font-size:26px;font-weight:700}
  #idle .s{font-size:18px;color:var(--ink-dim);margin-top:4px}

  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(75,183,73,.6)}70%{box-shadow:0 0 0 14px rgba(75,183,73,0)}100%{box-shadow:0 0 0 0 rgba(75,183,73,0)}}
  /* gentle enter for swapped cards */
  .card{transition:opacity .25s ease}
</style>
</head>
<body>
  <!-- LEADERBOARD (always on, unless ?view hides it) -->
  <div id="board" class="card hide">
    <h3><span class="dotlive"></span> Leaderboard</h3>
    <div id="lbRows"></div>
  </div>

  <!-- LOWER THIRD: current round (rating OR binary matchup) -->
  <div id="lower" class="card hide">
    <div class="brandtag">
      <div class="room">The A&amp;R Room</div>
      <div class="sess" id="sessName">—</div>
    </div>
    <div class="main">
      <div class="nowtag"><span id="nowTag">Now rating · Round 1</span><span id="ovTimer" class="ovtimer hide"></span></div>
      <!-- rating: single song -->
      <div id="ratingMain">
        <div class="title" id="curTitle">—</div>
        <div class="artist" id="curArtist"></div>
      </div>
      <!-- binary: A vs B, each title + artist; NO live split (it's what players predict) -->
      <div id="vsRow" class="hide">
        <div class="side a">
          <div class="st"><span class="sl">A</span><span class="stitle" id="aTitle">—</span></div>
          <div class="sartist" id="aArtist"></div>
        </div>
        <div class="vsmid">vs</div>
        <div class="side b">
          <div class="st"><span class="sl">B</span><span class="stitle" id="bTitle">—</span></div>
          <div class="sartist" id="bArtist"></div>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="countlabel" id="rightLabel">Votes in</div>
      <div class="bignum" id="rightNum">0</div>
      <div class="sub" id="rightSub"></div>
    </div>
  </div>

  <!-- BROADCAST in lower-third slot (host opt-in; never shows alongside the song) -->
  <div id="bcastLower" class="card hide">
    <div class="brandtag">
      <div class="room">📣 From the host</div>
      <div class="sess" id="bcastSess">—</div>
    </div>
    <div class="main">
      <div class="nowtag">Announcement</div>
      <div class="title" id="bcastLowerText" style="white-space:normal;font-size:44px;line-height:1.1">—</div>
    </div>
  </div>

  <!-- WINNER REVEAL: shares the lower-third slot -->
  <div id="result" class="card hide">
    <div class="crown">👑</div>
    <div class="rmeta">
      <div class="rlabel" id="resLabel">Round winner</div>
      <div class="rwin" id="resWinner">—</div>
      <!-- rating: song line under the winner -->
      <div class="rsong" id="resSong"></div>
      <!-- binary: full-width split revealed here (the prediction target, post-ratify only) -->
      <div id="resSplit" class="hide">
        <div class="bar"><div class="a" style="width:50%"></div><div class="b" style="width:50%"></div></div>
        <div class="labels"><span id="resSplitA">A 50%</span><span id="resSplitB">50% B</span></div>
      </div>
    </div>
    <div class="rroom" id="resRoom">
      <div class="k" id="resRoomK">Room average</div>
      <div class="v" id="resRoomV">—</div>
    </div>
  </div>

  <!-- IDLE -->
  <div id="idle" class="card">
    <div class="t" id="idleT">The A&amp;R Room</div>
    <div class="s" id="idleS">Connecting to the room…</div>
  </div>

<script>
const $=s=>document.querySelector(s);
const params=new URLSearchParams(location.search);
// Read a param case-insensitively (hosts type Leader_board, current_song, etc.).
const getP=(n)=>{ n=n.toLowerCase(); for(const [k,v] of params){ if(k.toLowerCase()===n) return v; } return null; };
const boolP=(n,def)=>{ const v=getP(n); if(v==null) return def; const s=String(v).trim().toLowerCase(); return !(s==='false'||s==='0'||s==='no'||s==='off'); };
const SID=getP('s')||getP('sessionId');
// ?view= controls which panels show: 'all' (default), 'lower', 'board', 'result'.
const VIEW=(getP('view')||'all').toLowerCase();
const showBoard=(VIEW==='all'||VIEW==='board');
const showLower=(VIEW==='all'||VIEW==='lower');
const showResultView=(VIEW==='all'||VIEW==='result');
// Per-element toggles (layered on top of ?view=):
//  current_song=true|false  — show the now-playing / round card (default on)
//  timer=true|false         — show the vote countdown on that card (default on)
//  leader_board=N           — how many leaderboard rows: 0 hides it, default 3, max 8
const SHOW_SONG=boolP('current_song',true);
const SHOW_TIMER=boolP('timer',true);
const LB_N=(()=>{ const v=getP('leader_board'); if(v==null) return 3; const n=parseInt(v,10); return isNaN(n)?3:Math.max(0,Math.min(8,n)); })();
// ?broadcast=N — seconds an overlay broadcast stays up before auto-hiding. Default 15;
// clamped to 1..120 so a message never persists for the whole stream.
const BC_MS=(()=>{ const v=parseFloat(getP('broadcast')); return ((isFinite(v)&&v>0)?Math.min(120,Math.max(1,v)):15)*1000; })();

// Fit the 1920x1080 stage into whatever the OBS source is sized to.
function fit(){
  const sx=window.innerWidth/1920, sy=window.innerHeight/1080;
  const s=Math.min(sx,sy);
  document.body.style.transform='scale('+s+')';
}
window.addEventListener('resize',fit);fit();

const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt1=n=>n==null?'—':(Math.round(n*10)/10).toFixed(1);

let lastBcAt=0, bcVisibleUntil=0, ovClosesAt=null;
// Vote countdown on the round card. Ticks every second off the round's closes_at
// (same source the player uses); hidden when ovClosesAt is null (timer off / not voting).
function paintTimer(){
  const el=$('#ovTimer'); if(!el) return;
  if(ovClosesAt==null){ el.classList.add('hide'); return; }
  const left=Math.max(0,Math.round((ovClosesAt-Date.now())/1000));
  const m=Math.floor(left/60), s=left%60;
  el.textContent=m+':'+String(s).padStart(2,'0');
  el.classList.toggle('warn',left<=10);
  el.classList.remove('hide');
}
setInterval(paintTimer,1000);
function showOnly(){
  // visibility driven by data + view flags
}

async function poll(){
  if(!SID){$('#idleT').textContent='No session';$('#idleS').textContent='Add ?s=SESSION_ID to the overlay URL';return;}
  let st;
  try{ st=await fetch('/api/overlay/state?s='+encodeURIComponent(SID)).then(r=>r.ok?r.json():Promise.reject(r.status)); }
  catch(e){ $('#idle').classList.remove('hide');$('#idleS').textContent='Reconnecting…'; return; }
  render(st);
}

function render(st){
  const isBin=st.session.poll_type==='binary';
  $('#sessName').textContent=st.session.name||'';

  // --- broadcast (host opt-in; rides the lower-third slot, never with the song) ---
  // The overlay only receives a broadcast when the host ticked "show on overlay";
  // it takes the lower-third slot and suppresses the round card + result banner
  // for BC_MS (?broadcast= seconds, default 15, clamped 1..120), then auto-hides
  // (host re-sends to repin).
  let showingBroadcast=false;
  if(st.broadcast&&st.broadcast.text){
    if(st.broadcast.at!==lastBcAt){
      lastBcAt=st.broadcast.at;
      bcVisibleUntil=Date.now()+BC_MS;
    }
    if(Date.now()<bcVisibleUntil){
      showingBroadcast=true;
      $('#bcastLowerText').textContent=st.broadcast.text;
      $('#bcastSess').textContent=st.session.name||'';
      $('#bcastLower').classList.remove('hide');
    }else $('#bcastLower').classList.add('hide');
  }else{ lastBcAt=0; $('#bcastLower').classList.add('hide'); }

  // --- leaderboard rail (row count from ?leader_board=, 0 hides it) ---
  if(showBoard && LB_N>0 && st.leaderboard && st.leaderboard.length){
    $('#lbRows').innerHTML=st.leaderboard.slice(0,LB_N).map(r=>`
      <div class="lbrow ${r.rank<=3?('top'+r.rank):''}">
        <div class="rk">${r.rank}</div>
        <div class="nm">${esc(r.name)}</div>
        <div class="pts">${r.points}</div>
      </div>`).join('');
    $('#board').classList.remove('hide');
  }else $('#board').classList.add('hide');

  // --- result banner vs current round (mutually exclusive) ---
  const result=st.result, current=st.current;
  let showingResult=false;
  if(showResultView && result && !showingBroadcast){
    showingResult=true;
    $('#resWinner').textContent=result.winner||'No votes';
    if(isBin){
      // Binary winner: full-width split revealed here (post-ratify only). Hide the
      // rating song line + the room-average right slot; show the split bar instead.
      $('#resSong').classList.add('hide');
      $('#resRoom').classList.add('hide');
      const a=result.room&&result.room.split_a!=null?Math.round(result.room.split_a):null;
      if(a!=null){
        $('#resSplit').classList.remove('hide');
        $('#resSplit .bar').children[0].style.width=a+'%';
        $('#resSplit .bar').children[1].style.width=(100-a)+'%';
        $('#resSplitA').textContent=(result.song_title||'A')+' '+a+'%';
        $('#resSplitB').textContent=(100-a)+'% '+(result.option_b_title||'B');
      }else $('#resSplit').classList.add('hide');
    }else{
      // Rating winner: song line under the name, room average in the right slot.
      $('#resSplit').classList.add('hide');
      $('#resSong').classList.remove('hide');
      $('#resSong').textContent=result.song_title+(result.song_artist?' · '+result.song_artist:'');
      $('#resRoom').classList.remove('hide');
      $('#resRoomK').textContent='Room average';
      $('#resRoomV').textContent=fmt1(result.room.average);
    }
    $('#result').classList.remove('hide');
  }else $('#result').classList.add('hide');

  // --- lower third (current round), hidden while a winner reveal or broadcast is up ---
  // ?current_song=false hides it entirely.
  if(showLower && SHOW_SONG && current && !showingResult && !showingBroadcast){
    $('#nowTag').textContent=(isBin?'Now playing · Round ':'Now rating · Round ')+current.idx+(current.status==='closed'?' · voting closed':'');
    // Vote countdown (?timer=false hides it) — only while voting is open.
    ovClosesAt=(SHOW_TIMER && current.status==='voting' && current.closes_at) ? Number(current.closes_at) : null;
    paintTimer();
    if(isBin){
      // Binary live: A vs B (full title + artist each). NO split — it's the prediction
      // target and stays sealed until ratify, same as the rating room average.
      $('#ratingMain').classList.add('hide');
      $('#vsRow').classList.remove('hide');
      $('#aTitle').textContent=current.song_title||'A';
      $('#aArtist').textContent=current.song_artist||'';
      $('#bTitle').textContent=current.option_b_title||'B';
      $('#bArtist').textContent=current.option_b_artist||'';
      $('#rightLabel').textContent='Votes in';
      $('#rightNum').textContent=current.votes||0;
      $('#rightSub').textContent='';
    }else{
      $('#vsRow').classList.add('hide');
      $('#ratingMain').classList.remove('hide');
      $('#curTitle').textContent=current.song_title||'—';
      $('#curArtist').textContent=current.song_artist||'';
      // Room average stays sealed until ratify to preserve the reveal — show votes-in.
      $('#rightLabel').textContent='Votes in';
      $('#rightNum').textContent=current.votes||0;
      $('#rightSub').textContent='';
    }
    if(current.giveaway){$('#rightSub').textContent='🎁 '+current.giveaway;}
    $('#lower').classList.remove('hide');
  }else{ $('#lower').classList.add('hide'); ovClosesAt=null; paintTimer(); }

  // --- idle card only when nothing else is showing ---
  const anything=!$('#lower').classList.contains('hide')||!$('#result').classList.contains('hide')||!$('#board').classList.contains('hide')||!$('#bcastLower').classList.contains('hide');
  if(anything){$('#idle').classList.add('hide');}
  else{
    $('#idle').classList.remove('hide');
    $('#idleT').textContent=st.session.name||'The A&R Room';
    $('#idleS').textContent=(st.session.status==='upcoming')?'Starting soon…':((st.participants||0)+' A&Rs in the room · waiting for the next song');
  }
}

poll();
// ---- realtime: refresh instantly on server push; polling stays as the safety net ----
// Until Ably connects (or if it's disabled/drops), we poll every 2s exactly as before.
// Once connected, the server pushes a signal on every material change and we refresh at
// once, so the poll drops to a slow 15s heartbeat. Any disconnect reverts to 2s polling.
let _pollT=setInterval(poll,2000), _rtOn=false, _rtRefreshT=null;
function _setPoll(ms){ clearInterval(_pollT); _pollT=setInterval(poll,ms); }
function _rtRefresh(){ if(_rtRefreshT)return; _rtRefreshT=setTimeout(()=>{_rtRefreshT=null;poll();},250); } // coalesce bursts
(async function initRealtime(){
  if(!SID) return;
  try{
    const probe=await fetch('/api/ably/token?s='+encodeURIComponent(SID)).then(r=>r.json());
    if(!probe||probe.enabled===false||!probe.keyName) return; // realtime off -> keep polling
    await new Promise((res,rej)=>{ if(window.Ably)return res(); const s=document.createElement('script'); s.src='https://cdn.ably.com/lib/ably.min-2.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    const rt=new Ably.Realtime({ authUrl:'/api/ably/token?s='+encodeURIComponent(SID) });
    rt.connection.on('connected',()=>{ _rtOn=true; _setPoll(15000); });
    rt.connection.on('disconnected',()=>{ if(_rtOn){_rtOn=false;_setPoll(2000);} });
    rt.connection.on('failed',()=>{ if(_rtOn){_rtOn=false;_setPoll(2000);} });
    rt.channels.get('anr:session:'+SID).subscribe('change',()=>_rtRefresh());
  }catch(e){ /* stay on polling */ }
})();
</script>
</body>
</html>
