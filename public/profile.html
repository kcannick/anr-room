<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/mark-color.png">
<title>The A&R Room · Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0b16;--panel:#171328;--panel-2:#1d1733;--line:#2e2750;
    --ink:#f3f0fb;--ink-dim:#a9a2c9;--ink-faint:#6f688f;
    --signal:#4bb749;--signal-deep:#379235;--hot:#ff5d6c;--cool:#7c6ff0;--accent:#6d5fe0;--amber:#f5a524;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:30px 16px 60px;background:radial-gradient(130% 70% at 50% -6%, #241a4d 0%, var(--bg) 52%);color:var(--ink);font-family:"DM Sans",system-ui,sans-serif;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:460px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:9px;padding:6px 2px 18px}
  .nav .dot{width:9px;height:9px;border-radius:50%;background:var(--signal);box-shadow:0 0 10px 1px rgba(75,183,73,.6)}
  .nav .nm{font-weight:800;font-size:15px}
  .pf{background:radial-gradient(120% 55% at 50% -4%, #281d52 0%, var(--bg) 62%);border:1px solid var(--line);border-radius:22px;padding:26px 20px;text-align:center}
  .pf-photo{width:108px;height:108px;border-radius:50%;margin:0 auto 15px;border:2px solid var(--accent);object-fit:cover;display:flex;align-items:center;justify-content:center;background:#221b3a;color:var(--accent);font-weight:800;font-size:36px}
  .pf-name{font-size:24px;font-weight:800;letter-spacing:-.01em}
  .pf-loc{font-size:13px;color:var(--ink-dim);margin-top:3px}
  .pf-roles{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:15px 0 4px}
  .role{font-size:11px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#0f0c1c;color:var(--ink-dim)}
  .role.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .pf-socials{display:flex;gap:9px;justify-content:center;margin:16px 0 4px;flex-wrap:wrap}
  .soc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);border:1px solid var(--line);background:#0f0c1c;border-radius:10px;padding:8px 13px}
  .soc:hover{border-color:var(--accent)}
  .pf-stats{display:flex;gap:10px;margin-top:18px}
  .stat{flex:1;background:#0f0c1c;border:1px solid var(--line);border-radius:13px;padding:13px 8px}
  .stat .v{font-family:"Space Mono",monospace;font-size:21px;font-weight:700;line-height:1}
  .stat .v.green{color:var(--signal)}
  .stat .v.amber{color:var(--amber)}
  .stat .l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px}
  .pf-back{font-size:12px;color:var(--cool);margin-top:18px;display:inline-block}
  .empty{text-align:center;color:var(--ink-faint);font-size:14px;padding:70px 0;line-height:1.6}
  .empty .ico{font-size:30px;margin-bottom:10px;opacity:.6}
</style>
</head>
<body>
<div class="wrap">
  <a class="nav" href="/"><span class="dot"></span><span class="nm">The A&amp;R Room</span></a>
  <div id="content"><div class="empty"><div class="ico">🎧</div>Loading…</div></div>
</div>
<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=n=>String(n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
const fmt=n=>(Number(n)||0).toLocaleString();
const UID=decodeURIComponent((location.pathname.match(/^\/u\/([^/?#]+)/)||[])[1]||'');

function igUrl(h){return 'https://instagram.com/'+encodeURIComponent(h.replace(/^@+/,''));}
function ttUrl(h){return 'https://www.tiktok.com/@'+encodeURIComponent(h.replace(/^@+/,''));}

function render(p){
  const photo=p.photoUrl?`<img class="pf-photo" src="${esc(p.photoUrl)}" alt="">`:`<div class="pf-photo">${esc(initials(p.name))}</div>`;
  const roles=(p.categories||[]).map(c=>`<span class="role${c===p.primaryCategory?' primary':''}">${esc(c)}</span>`).join('');
  const socials=[
    p.instagram?`<a class="soc" href="${esc(igUrl(p.instagram))}" target="_blank" rel="noopener">Instagram ↗</a>`:'',
    p.tiktok?`<a class="soc" href="${esc(ttUrl(p.tiktok))}" target="_blank" rel="noopener">TikTok ↗</a>`:''
  ].filter(Boolean).join('');
  const st=p.stats||{};
  const rank=st.seriesRank?`<div class="stat"><div class="v amber">#${st.seriesRank}</div><div class="l">${esc((st.seriesTitle||'Series'))} rank</div></div>`:'';
  $('#content').innerHTML=`
    <div class="pf">
      ${photo}
      <div class="pf-name">${esc(p.name)}</div>
      ${p.location?`<div class="pf-loc">📍 ${esc(p.location)}</div>`:''}
      ${roles?`<div class="pf-roles">${roles}</div>`:''}
      ${socials?`<div class="pf-socials">${socials}</div>`:''}
      <div class="pf-stats">
        <div class="stat"><div class="v">${fmt(st.points)}</div><div class="l">Points</div></div>
        <div class="stat"><div class="v green">${fmt(st.sessions)}</div><div class="l">Sessions</div></div>
        ${rank}
      </div>
      <a class="pf-back" href="/">← Back to The A&amp;R Room</a>
    </div>`;
}
async function load(){
  if(!UID){$('#content').innerHTML='<div class="empty"><div class="ico">🤔</div>No profile specified.</div>';return;}
  try{
    const r=await fetch('/api/profile?u='+encodeURIComponent(UID));
    if(!r.ok)throw 0;
    const d=await r.json();
    render(d.profile);
    document.title='The A&R Room · '+(d.profile.name||'Profile');
  }catch(e){
    $('#content').innerHTML='<div class="empty"><div class="ico">🤔</div>This profile isn\'t available.<br><a class="pf-back" href="/" style="margin-top:12px">← Back to The A&R Room</a></div>';
  }
}
load();
</script>
</body>
</html>
